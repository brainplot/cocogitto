
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests for platform  ${{ matrix.os }}/${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [x86_64-osx, x86_64-unknown-linux-musl, armv7-unknown-linux-musleabihf, x86_64-pc-windows-msvc]
        include:
          - os: macos-latest
            target: x86_64-osx
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git config --global user.email github-actions@github.com
          git config --global user.name github-actions

# This should be added when the action is able to run on multiple platform
#      - name: Conventional commit check
#        uses: cocogitto/cocogitto-action@v3.5
#        with:
#          git-user: 'github-actions'
#          git-user-email: 'github-actions@github.com'

      - name: Install stable toolchain
        uses: taiki-e/install-action@nextest
        if: ${{matrix.target}} != "x86_64-unknown-linux-musl"

      - name: Test with latest nextest release
        if: ${{matrix.target}} != "x86_64-unknown-linux-musl"
        uses: actions-rs/cargo@v1
        with:
          command: nextest
          args: run

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        if: ${{matrix.target}} == "x86_64-unknown-linux-musl"
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: ${{matrix.target}} == "x86_64-unknown-linux-musl"
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: actions-rs/cargo@v1
        if: ${{matrix.target}} == "x86_64-unknown-linux-musl"
        with:
          command: llvm-cov
          args: --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: ${{matrix.target}} == "x86_64-unknown-linux-musl"
        uses: codecov/codecov-action@v3
        with:
          files: lcov.info
          fail_ci_if_error: true

      - uses: Swatinem/rust-cache@v1

  lints:
    name: Lints & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        continue-on-error: false
        with:
          command: fmt
          args: --all -- --check

      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        continue-on-error: false
        with:
          command: clippy
          args: -- -D warnings

      - uses: Swatinem/rust-cache@v1
